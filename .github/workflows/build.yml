name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Extract Version
      id: version
      run: |
        $version = (Get-Content version.json | ConvertFrom-Json).version
        Write-Output "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
    
    - name: Restore Dependencies
      run: dotnet restore ShieldX.sln
    
    - name: Build
      run: dotnet build ShieldX.sln --configuration ${{ env.CONFIGURATION }} --no-restore
    
    - name: Run Tests
      run: dotnet test ShieldX.Tests --configuration ${{ env.CONFIGURATION }} --no-build --logger "trx;LogFileName=test-results.trx" || true
      continue-on-error: true
      
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/test-results.trx'
      continue-on-error: true
    
    - name: Publish Application
      run: dotnet publish ShieldX.csproj -c ${{ env.CONFIGURATION }} -o publish --self-contained
    
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: shieldx-release
        path: publish
        retention-days: 7
    
    - name: Report Build Status
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '❌ Build failed. Check the Actions tab for details.'
          })
