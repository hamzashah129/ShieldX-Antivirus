name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  create-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Extract Version from Tag
      id: version
      shell: powershell
      run: |
        $tag = "${{ github.ref }}"
        $version = $tag -replace 'refs/tags/v', ''
        Write-Output "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Extracted version: $version"
    
    - name: Build Release Package
      shell: powershell
      run: |
        Write-Host "Building release package..." -ForegroundColor Cyan
        Write-Host "Working directory: $(Get-Location)" -ForegroundColor Gray
        Write-Host "Files in current directory:" -ForegroundColor Gray
        Get-ChildItem -Filter "build-installer.ps1" | ForEach-Object { Write-Host "  ✓ $($_.Name)" }
        
        & .\build-installer.ps1 -Version "${{ steps.version.outputs.VERSION }}"
        
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Build failed with exit code: $LASTEXITCODE" -ForegroundColor Red
          exit $LASTEXITCODE
        }
        
        Write-Host "Build completed successfully" -ForegroundColor Green
    
    - name: Verify Release Package
      shell: powershell
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $zipPath = "ShieldX.Installer\output\ShieldX_Professional_v$version.zip"
        
        Write-Host "Verifying release package at: $zipPath" -ForegroundColor Yellow
        
        if (Test-Path $zipPath) {
          $size = (Get-Item $zipPath).Length / 1MB
          Write-Host "✅ Package found: $($size.ToString('0.0')) MB" -ForegroundColor Green
        } else {
          Write-Host "❌ Package not found!" -ForegroundColor Red
          Write-Host "Listing ShieldX.Installer\output:" -ForegroundColor Yellow
          Get-ChildItem "ShieldX.Installer\output" -ErrorAction SilentlyContinue | Format-Table Name, Length
          exit 1
        }
    
    - name: Prepare Release Directory
      shell: powershell
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $releaseDir = "releases"
        
        New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
        
        $source = "ShieldX.Installer\output\ShieldX_Professional_v$version.zip"
        $dest = "$releaseDir\ShieldX_Professional_v$version.zip"
        
        Copy-Item $source $dest -Force
        
        $size = (Get-Item $dest).Length / 1MB
        Write-Host "Release ready: $dest ($($size.ToString('0.0')) MB)"
    
    - name: Generate Release Notes
      shell: powershell
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $timestamp = Get-Date -Format "MMMM dd, yyyy HH:mm:ss"
        
        $notes = @"
## ShieldX Professional Antivirus v$version

**Release Information**
- **Version**: $version
- **Release Date**: $timestamp (UTC)
- **Type**: Production Release

**What's Included**
- ✅ Self-contained Windows application (70+ MB)
- ✅ Integrated .NET 8.0 runtime
- ✅ Real-time threat protection
- ✅ Built-in threat scanner
- ✅ Dark/Light theme support
- ✅ Automatic update mechanism
- ✅ Advanced settings panel

**Installation Instructions**
1. Download `ShieldX_Professional_v$version.zip`
2. Extract to desired location
3. Run `ShieldX.exe` (administrative privileges recommended)
4. Complete the setup wizard

**System Requirements**
- **OS**: Windows 7 SP1 or later
- **RAM**: 256 MB minimum
- **Disk**: 100 MB free space
- **.NET**: Included in package

**Security**
- 🔐 Application digitally code-signed
- 🔐 Certificate Thumbprint: D27B8EEC9DFE10EBDFD3B7B1BAAD218E3304CCA9
- 🔐 Valid until: April 26, 2029

**Documentation**
For detailed documentation and additional features, visit the [GitHub Repository](https://github.com/${{ github.repository }})

---
*ShieldX Antivirus - Professional Edition*
"@
        
        Add-Content -Path "release-notes.md" -Value $notes
        Write-Host "Release notes generated"
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: releases/*
        body_path: release-notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload to Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ShieldX_Release_v${{ steps.version.outputs.VERSION }}
        path: releases/
        retention-days: 90
        path: releases
        retention-days: 30
    
    - name: Cleanup
      if: always()
      run: |
        Remove-Item "code-signing.pfx" -Force -ErrorAction SilentlyContinue
        Write-Host "✅ Cleanup complete"
