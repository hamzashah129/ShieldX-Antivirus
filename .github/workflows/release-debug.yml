name: Release Debug

on:
  push:
    tags:
      - 'test-*'

jobs:
  debug-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Environment Check
      shell: powershell
      run: |
        Write-Host "=== ENVIRONMENT ===" -ForegroundColor Cyan
        Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)" -ForegroundColor Yellow
        Write-Host "Working Directory: $(Get-Location)" -ForegroundColor Yellow
        Write-Host "Files in current dir:" -ForegroundColor Yellow
        Get-ChildItem -Name | Select-Object -First 20
        
    - name: Check for build-installer.ps1
      shell: powershell
      run: |
        Write-Host "=== FILE CHECK ===" -ForegroundColor Cyan
        $script = ".\build-installer.ps1"
        if (Test-Path $script) {
          Write-Host "✅ build-installer.ps1 found" -ForegroundColor Green
          $info = Get-Item $script
          Write-Host "Size: $($info.Length) bytes" -ForegroundColor Gray
          Write-Host "Modified: $($info.LastWriteTime)" -ForegroundColor Gray
        } else {
          Write-Host "❌ build-installer.ps1 NOT found" -ForegroundColor Red
          exit 1
        }
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Verify .NET
      shell: powershell
      run: |
        Write-Host "=== .NET CHECK ===" -ForegroundColor Cyan
        dotnet --version
        dotnet --list-sdks
        
    - name: Extract Version
      id: version
      shell: powershell
      run: |
        $tag = "${{ github.ref }}"
        Write-Host "Raw tag: $tag" -ForegroundColor Yellow
        $version = $tag -replace 'refs/tags/test-', ''
        Write-Host "Extracted version: $version" -ForegroundColor Green
        Write-Output "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        
    - name: List ShieldX.Installer Directory
      shell: powershell
      run: |
        Write-Host "=== ShieldX.Installer Contents ===" -ForegroundColor Cyan
        Get-ChildItem -Path "ShieldX.Installer" -Recurse -Depth 2 | Format-Table Name, PSIsContainer
        
    - name: Run Build Script (Dry Run)
      shell: powershell
      run: |
        Write-Host "=== RUNNING BUILD SCRIPT ===" -ForegroundColor Cyan
        try {
          & .\build-installer.ps1 -Version "${{ steps.version.outputs.VERSION }}" 2>&1
          $exitCode = $LASTEXITCODE
          Write-Host "Exit code: $exitCode" -ForegroundColor Yellow
          if ($exitCode -ne 0) {
            Write-Host "❌ Build script failed" -ForegroundColor Red
            exit 1
          }
        } catch {
          Write-Host "❌ Exception during build:" -ForegroundColor Red
          Write-Host "$_" -ForegroundColor Red
          exit 1
        }
        
    - name: Check Output
      shell: powershell
      if: always()
      run: |
        Write-Host "=== BUILD OUTPUT ===" -ForegroundColor Cyan
        $version = "${{ steps.version.outputs.VERSION }}"
        $output = "ShieldX.Installer\output"
        
        if (Test-Path $output) {
          Write-Host "Files in $output:" -ForegroundColor Yellow
          Get-ChildItem $output -Recurse | Format-Table Name, Length, LastWriteTime
        } else {
          Write-Host "❌ Output directory not found!" -ForegroundColor Red
        }
