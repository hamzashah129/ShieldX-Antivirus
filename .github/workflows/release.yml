name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release

jobs:
  create-release:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Extract Version
      id: version
      run: |
        $tag = "${{ github.ref }}"
        $version = $tag -replace 'refs/tags/v', ''
        Write-Output "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
    
    - name: Import Code Signing Certificate
      run: |
        $certBytes = [Convert]::FromBase64String("${{ secrets.CODE_SIGNING_CERT }}")
        [IO.File]::WriteAllBytes("certificates/ShieldX_CodeSigning.pfx", $certBytes)
        
        $pwd = ConvertTo-SecureString "${{ secrets.CERT_PASSWORD }}" -Force -AsPlainText
        Import-PfxCertificate -FilePath "certificates/ShieldX_CodeSigning.pfx" `
          -CertStoreLocation "Cert:\CurrentUser\My" `
          -Password $pwd
    
    - name: Build and Sign Release
      run: |
        & .\build-installer.ps1 -SignInstaller
      env:
        CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
    
    - name: Verify Release Package
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $zipPath = "ShieldX.Installer\output\ShieldX_Professional_v$version.zip"
        
        if (Test-Path $zipPath) {
          $size = (Get-Item $zipPath).Length / 1MB
          Write-Host "✅ Release package found: $zipPath ($size MB)"
        } else {
          Write-Host "❌ ERROR: Release package not found at $zipPath"
          Write-Host "Available files in ShieldX.Installer\output:"
          Get-ChildItem "ShieldX.Installer\output" -ErrorAction SilentlyContinue | Format-Table Name, Length
          exit 1
        }
    
    - name: Prepare Release Directory
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $releaseDir = "releases"
        New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
        
        Copy-Item "ShieldX.Installer\output\ShieldX_Professional_v$version.zip" `
          "$releaseDir\ShieldX_Professional_v$version.zip" -Force
        
        Write-Host "Release files:"
        Get-ChildItem $releaseDir | Format-Table Name, @{Name="Size (MB)"; Expression={[math]::Round($_.Length/1MB, 2)}}
    
    - name: Generate Release Notes
      id: release_notes
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $notes = @"
## ShieldX Professional Antivirus v$version

**Release Information**
- Version: $version
- Release Date: $(Get-Date -Format 'MMMM dd, yyyy')
- Built: $(Get-Date -Format 'HH:mm:ss UTC')
- Code Signed: ✅ Yes (Self-Signed Certificate)

**What's Included**
- Self-contained application (includes .NET 8.0 runtime)
- Real-time threat protection
- Built-in threat scanner
- Dark/Light theme support
- Auto-update mechanism

**Installation**
1. Download ShieldX_Professional_v$version.zip
2. Extract to desired location
3. Run ShieldX.exe to start

**Verification**
- Application is digitally code-signed
- Thumbprint: D27B8EEC9DFE10EBDFD3B7B1BAAD218E3304CCA9
- Valid until: 2029-04-26

**System Requirements**
- Windows 7 SP1 or later
- .NET 8.0 (included in package)
- 256 MB RAM minimum

For more information, visit: https://github.com/${{ github.repository }}
"@
        Add-Content -Path "release-notes.md" -Value $notes
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: releases/*
        body_path: release-notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ShieldX_Release_v${{ steps.version.outputs.VERSION }}
        path: releases/*
        retention-days: 30
        path: releases
        retention-days: 30
    
    - name: Cleanup
      if: always()
      run: |
        Remove-Item "code-signing.pfx" -Force -ErrorAction SilentlyContinue
        Write-Host "✅ Cleanup complete"
