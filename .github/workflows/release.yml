name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Extract Version from Tag
      id: version
      shell: powershell
      run: |
        $tag = "${{ github.ref }}"
        $version = $tag -replace 'refs/tags/v', ''
        Write-Output "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Version: $version"
    
    - name: Build Release Package
      shell: powershell
      run: |
        Write-Host "Building release package..." -ForegroundColor Cyan
        Write-Host "Version: ${{ steps.version.outputs.VERSION }}" -ForegroundColor Yellow
        
        & .\build-installer.ps1 -Version "${{ steps.version.outputs.VERSION }}"
        
        $exitCode = $LASTEXITCODE
        Write-Host "Build script exit code: $exitCode" -ForegroundColor Yellow
        
        if ($exitCode -ne 0) {
          Write-Host "Build FAILED" -ForegroundColor Red
          exit 1
        }
        
        Write-Host "Build completed successfully!" -ForegroundColor Green
    
    - name: Verify Release Package
      shell: powershell
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $zipPath = "ShieldX.Installer\output\ShieldX_Professional_v$version.zip"
        
        Write-Host "Checking: $zipPath" -ForegroundColor Yellow
        
        if (Test-Path $zipPath) {
          $size = (Get-Item $zipPath).Length / 1MB
          Write-Host "Package found: $($size.ToString('0.0')) MB" -ForegroundColor Green
        } else {
          Write-Host "ERROR: Package not found!" -ForegroundColor Red
          Write-Host "Contents of ShieldX.Installer\output:" -ForegroundColor Yellow
          Get-ChildItem "ShieldX.Installer\output" -ErrorAction SilentlyContinue | Format-Table Name, Length
          exit 1
        }
    
    - name: Prepare Release Directory
      shell: powershell
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        New-Item -ItemType Directory -Path "releases" -Force | Out-Null
        Copy-Item "ShieldX.Installer\output\ShieldX_Professional_v$version.zip" "releases\ShieldX_Professional_v$version.zip" -Force
        Write-Host "Release package prepared"
    
    - name: Generate Release Notes
      shell: powershell
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $date = Get-Date -Format "MMMM dd, yyyy"
        
        $notes = @"
## ShieldX Professional Antivirus v$version

**Release Information**
- **Version**: $version
- **Release Date**: $date
- **Type**: Production Release

**Features**
- Self-contained Windows application (70+ MB)
- Integrated .NET 8.0 runtime
- Real-time threat protection
- Built-in threat scanner
- Dark/Light theme support
- Automatic update mechanism

**Installation**
1. Download ShieldX_Professional_v$version.zip
2. Extract to desired location
3. Run ShieldX.exe

**System Requirements**
- Windows 7 SP1 or later
- 256 MB RAM minimum
- 100 MB disk space

**Security**
- Code Signed with valid certificate
- Thumbprint: D27B8EEC9DFE10EBDFD3B7B1BAAD218E3304CCA9
- Valid until: April 26, 2029

For documentation and support, visit: https://github.com/${{ github.repository }}
"@
        
        Add-Content -Path "release-notes.md" -Value $notes
        Write-Host "Release notes created"
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: releases/*
        body_path: release-notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ShieldX_Release_v${{ steps.version.outputs.VERSION }}
        path: releases/
        retention-days: 90
