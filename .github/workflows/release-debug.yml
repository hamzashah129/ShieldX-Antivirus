name: Release Debug

on:
  push:
    tags:
      - 'test-*'

jobs:
  debug-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Environment Check
      shell: powershell
      run: |
        Write-Host "=== ENVIRONMENT ===" -ForegroundColor Cyan
        Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)" -ForegroundColor Yellow
        Write-Host "Working Directory: $(Get-Location)" -ForegroundColor Yellow
        Write-Host "Files in current dir:" -ForegroundColor Yellow
        Get-ChildItem -Name | Select-Object -First 20 | Tee-Object -FilePath debug-log.txt -Append
        
    - name: Check for build-installer.ps1
      shell: powershell
      run: |
        Write-Host "=== FILE CHECK ===" -ForegroundColor Cyan
        $script = ".\build-installer.ps1"
        if (Test-Path $script) {
          Write-Host "✅ build-installer.ps1 found" -ForegroundColor Green
          $info = Get-Item $script
          Write-Host "Size: $($info.Length) bytes" -ForegroundColor Gray
          Write-Host "Modified: $($info.LastWriteTime)" -ForegroundColor Gray
          "✅ build-installer.ps1 found (Size: $($info.Length) bytes)" | Tee-Object -FilePath debug-log.txt -Append
        } else {
          Write-Host "❌ build-installer.ps1 NOT found" -ForegroundColor Red
          "❌ build-installer.ps1 NOT found" | Tee-Object -FilePath debug-log.txt -Append
          exit 1
        }
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Verify .NET
      shell: powershell
      run: |
        Write-Host "=== .NET CHECK ===" -ForegroundColor Cyan
        "=== .NET VERSION ===" | Tee-Object -FilePath debug-log.txt -Append
        dotnet --version | Tee-Object -FilePath debug-log.txt -Append
        "=== .NET SDKs ===" | Tee-Object -FilePath debug-log.txt -Append
        dotnet --list-sdks | Tee-Object -FilePath debug-log.txt -Append
        
    - name: Extract Version
      id: version
      shell: powershell
      run: |
        $tag = "${{ github.ref }}"
        Write-Host "Raw tag: $tag" -ForegroundColor Yellow
        "Raw tag: $tag" | Tee-Object -FilePath debug-log.txt -Append
        
        $version = $tag -replace 'refs/tags/test-', ''
        Write-Host "Extracted version: $version" -ForegroundColor Green
        "Extracted version: $version" | Tee-Object -FilePath debug-log.txt -Append
        
        Write-Output "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        
    - name: List ShieldX.Installer Directory
      shell: powershell
      run: |
        Write-Host "=== ShieldX.Installer Contents ===" -ForegroundColor Cyan
        "=== ShieldX.Installer Contents ===" | Tee-Object -FilePath debug-log.txt -Append
        Get-ChildItem -Path "ShieldX.Installer" -Depth 2 2>&1 | Format-Table Name, PSIsContainer | Tee-Object -FilePath debug-log.txt -Append
        
    - name: Run Build Script
      shell: powershell
      run: |
        "=== RUNNING BUILD SCRIPT ===" | Tee-Object -FilePath debug-log.txt -Append
        "Version: ${{ steps.version.outputs.VERSION }}" | Tee-Object -FilePath debug-log.txt -Append
        
        try {
          & .\build-installer.ps1 -Version "${{ steps.version.outputs.VERSION }}" 2>&1 | Tee-Object -FilePath debug-log.txt -Append
          $exitCode = $LASTEXITCODE
          "Build script exit code: $exitCode" | Tee-Object -FilePath debug-log.txt -Append
          
          if ($exitCode -ne 0) {
            Write-Host "❌ Build script failed with code $exitCode" -ForegroundColor Red
            "❌ Build script failed with code $exitCode" | Tee-Object -FilePath debug-log.txt -Append
            exit 1
          }
        } catch {
          "❌ Exception: $_" | Tee-Object -FilePath debug-log.txt -Append
          exit 1
        }
        
    - name: Check Output
      shell: powershell
      if: always()
      run: |
        "=== BUILD OUTPUT ===" | Tee-Object -FilePath debug-log.txt -Append
        $version = "${{ steps.version.outputs.VERSION }}"
        $output = "ShieldX.Installer\output"
        
        if (Test-Path $output) {
          "Output directory found:" | Tee-Object -FilePath debug-log.txt -Append
          Get-ChildItem $output -Recurse | Format-Table Name, Length, LastWriteTime | Tee-Object -FilePath debug-log.txt -Append
        } else {
          "❌ Output directory not found!" | Tee-Object -FilePath debug-log.txt -Append
        }
        
    - name: Upload Debug Log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-log
        path: debug-log.txt
        retention-days: 7
