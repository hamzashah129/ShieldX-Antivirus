name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release

jobs:
  create-release:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Extract Version
      id: version
      run: |
        $tag = "${{ github.ref }}"
        $version = $tag -replace 'refs/tags/v', ''
        Write-Output "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
    
    - name: Import Code Signing Certificate
      run: |
        $certBytes = [Convert]::FromBase64String("${{ secrets.CODE_SIGNING_CERT }}")
        [IO.File]::WriteAllBytes("certificates/ShieldX_CodeSigning.pfx", $certBytes)
        
        $pwd = ConvertTo-SecureString "${{ secrets.CERT_PASSWORD }}" -Force -AsPlainText
        Import-PfxCertificate -FilePath "certificates/ShieldX_CodeSigning.pfx" `
          -CertStoreLocation "Cert:\CurrentUser\My" `
          -Password $pwd
    
    - name: Build and Sign Release
      run: |
        & .\build-installer.ps1 -SignInstaller
      env:
        CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
    
    - name: Create Release Archive
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $releaseDir = "releases"
        New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
        
        # Copy signed release package
        Copy-Item "ShieldX.Installer\output\ShieldX_Professional_v$version.zip" `
          "$releaseDir\ShieldX_Professional_v$version.zip" -Force
    
    - name: Generate Release Notes
      id: release_notes
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $notes = @"
## ShieldX Professional Antivirus v$version

**Release Information**
- Version: $version
- Release Date: $(Get-Date -Format 'MMMM dd, yyyy')
- Built: $(Get-Date -Format 'HH:mm:ss UTC')
- Code Signed: ✅ Yes

**Installation**
Extract and run ShieldX_Professional_v$version.zip to get started.

**Verification**
- Application is digitally signed with self-signed certificate
- Ready for distribution

For more details, visit: https://github.com/${{ github.repository }}
"@
        Add-Content -Path "release-notes.md" -Value $notes
        Write-Output "NOTES<<EOF`n$notes`nEOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: releases/*
        body_path: release-notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          "$releaseDir\ShieldX_Professional_v$version`_Setup.exe" -Force
        
        # Create portable ZIP
        Compress-Archive -Path "publish\*" `
          -DestinationPath "$releaseDir\ShieldX_Professional_v$version`_Portable.zip" `
          -Force
        
        Write-Host "✅ Release archives created"
        Get-ChildItem $releaseDir | Format-Table Name, Length
    
    - name: Generate Release Notes
      id: release_notes
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $notes = @"
        ## ShieldX Professional Antivirus v$version
        
        ### Release Information
        - **Version**: $version
        - **Release Date**: $(Get-Date -Format 'MMMM dd, yyyy')
        - **Built**: $(Get-Date -Format 'HH:mm:ss UTC')
        - **Signed**: ✅ Yes (Code Signed Executable)
        
        ### Files
        - **ShieldX_Professional_v$version`_Setup.exe** - Main installer (signed)
        - **ShieldX_Professional_v$version`_Portable.zip** - Portable version
        
        ### Installation
        Run the Setup.exe file and follow the prompts.
        
        ### Verification
        - Signature: Digitally Signed
        - Publisher: SYED HAMZA ALI SHAH
        - Safe to Install: ✅ Yes
        
        ---
        For documentation, see [CODE_SIGNING_GUIDE.md](https://github.com/${{ github.repository }}/blob/main/CODE_SIGNING_GUIDE.md)
        "@
        
        Add-Content -Path "release-notes.md" -Value $notes
        Write-Output "NOTES<<EOF`n$notes`nEOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: releases/*
        body_path: release-notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ShieldX_v${{ steps.version.outputs.VERSION }}
        path: releases
        retention-days: 30
    
    - name: Cleanup
      if: always()
      run: |
        Remove-Item "code-signing.pfx" -Force -ErrorAction SilentlyContinue
        Write-Host "✅ Cleanup complete"
